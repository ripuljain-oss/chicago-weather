<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chicago Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="weatherCanvas"></canvas>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="app">
    <header class="header glass">
      <div class="location">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        Chicago, IL
      </div>
      <div class="header-right">
        <span id="dateTime"></span>
        <div class="live-badge">
          <span class="live-dot"></span>
          Live
        </div>
      </div>
    </header>

    <main id="main">
      <!-- Loading -->
      <div id="loading" class="loading">
        <div class="sk sk-icon"></div>
        <div class="sk sk-temp"></div>
        <div class="sk sk-text"></div>
        <div class="sk sk-text short"></div>
      </div>

      <!-- Content -->
      <div id="content" class="hidden">

        <!-- Hero -->
        <section class="hero glass">
          <div id="mainIcon" class="main-icon">☀️</div>
          <div class="hero-info">
            <div class="temp-row">
              <span id="temp" class="temp">--</span>
              <button id="unitBtn" class="unit-btn">°F</button>
            </div>
            <div id="condition" class="condition">--</div>
            <div id="feelsLike" class="feels-like">Feels like --</div>
          </div>
        </section>

        <!-- Stats -->
        <div id="statsGrid" class="stats-grid"></div>

        <!-- Hourly -->
        <section class="forecast-card glass">
          <div class="card-header">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            Hourly Forecast
          </div>
          <div id="hourlyStrip" class="hourly-strip"></div>
        </section>

        <!-- 7-Day -->
        <section class="forecast-card glass">
          <div class="card-header">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            7-Day Forecast
          </div>
          <div id="dailyList" class="daily-list"></div>
        </section>

      </div>
    </main>

    <footer class="footer">
      <span id="lastUpdated">Fetching weather…</span>
      <span>Open-Meteo API</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
